name: Daily AI Intrusion Report

on:
  schedule:
    # Run every day at 22:00 UTC
    - cron: "0 22 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  analyse-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch (source code)
        uses: actions/checkout@v4
        with:
          path: src

      - name: Checkout gh-pages branch (accumulated data)
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: data
        continue-on-error: true   # First run — branch may not exist yet

      - name: Bootstrap gh-pages if missing
        run: |
          if [ ! -d data/.git ]; then
            mkdir -p data
            cd data
            git init
            git checkout -b gh-pages
          fi
          mkdir -p data/reports

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: src/requirements.txt

      - name: Install dependencies
        run: pip install -r src/requirements.txt

      - name: Run analysis (yesterday → data/reports/)
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
        working-directory: src
        run: python -m report.cli --out ../data/reports

      - name: Prune reports older than 30 days
        run: |
          cutoff=$(date -u -d '30 days ago' +%Y-%m-%d)
          for f in data/reports/report-*.json; do
            # Extract date from filename: report-YYYY-MM-DD.json
            d=$(basename "$f" | sed 's/report-//;s/\.json//')
            if [ "$d" \< "$cutoff" ]; then
              echo "Removing old report: $f"
              rm -f "$f"
            fi
          done

      - name: Generate static site (all reports → data/site/)
        working-directory: src
        run: python -m report.html --input ../data/reports --out ../data/site

      - name: Deploy to gh-pages branch
        working-directory: data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Move site output to root for GitHub Pages
          cp -r site/* . 2>/dev/null || true
          # Stage everything
          git add -A
          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No changes to deploy"
          else
            git commit -m "Daily report $(date -u +%Y-%m-%d)"
            git push origin gh-pages
          fi
