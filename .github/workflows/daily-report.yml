name: Daily AI Radar Report

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  analyse-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Restore previous data
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p data/reports
          # Try artifact from the latest successful run
          RUN_ID=$(gh run list -w daily-report.yml --status success -L 1 \
                   --json databaseId -q '.[0].databaseId' 2>/dev/null || true)
          if [ -n "$RUN_ID" ]; then
            if gh run download "$RUN_ID" --name radar-data -D data/reports 2>/dev/null; then
              echo "✓ Restored from artifact ($(ls data/reports/*.json 2>/dev/null | wc -l) files)"
              exit 0
            fi
          fi
          # Fallback: migrate from gh-pages branch (one-time transition)
          echo "Artifact not found, trying gh-pages branch …"
          git fetch origin gh-pages 2>/dev/null || exit 0
          git checkout FETCH_HEAD -- reports/ 2>/dev/null || exit 0
          if [ -d reports ]; then
            cp reports/*.json data/reports/ 2>/dev/null || true
            rm -rf reports
            echo "✓ Migrated from gh-pages ($(ls data/reports/*.json 2>/dev/null | wc -l) files)"
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          LLM_CONCURRENCY: ${{ vars.LLM_CONCURRENCY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
        run: python -m report.cli --out data/reports

      - name: Save data artifact
        uses: actions/upload-artifact@v4
        with:
          name: radar-data
          path: data/reports/
          retention-days: 90
          overwrite: true

      - name: Generate static site
        run: python -m report.html --input data/reports --out data/site

      - name: Deploy to gh-pages
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          cd data/site
          touch .nojekyll
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy $(date -u +%Y-%m-%d)"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
