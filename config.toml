# GitHub AI-Radar Configuration
# All options have default values. Modify as needed.
# Secrets (tokens, API keys) must be set via environment variables.

[github]
# Repositories to analyse (URL or owner/repo format, one per line)
repos = [
    "https://github.com/HKUDS/nanobot",
    "https://github.com/openclaw/openclaw",
    "ollama/ollama",
    "open-webui/open-webui",
    "huggingface/transformers",
    "mem0ai/mem0",
    "torvalds/linux",
    "moeyui1/github-ai-detector"
]
# Number of today's trending repos to pull automatically per run (0 = disabled)
trending_count = 10
# Number of trending AI repos to pull additionally (0 = disabled)
trending_ai_count = 10
# Topics to search for AI trending repos
trending_ai_topics = ["artificial-intelligence", "machine-learning", "llm", "generative-ai", "deep-learning"]

[llm]
# LLM Provider: "none" | "openai" | "github" (override via LLM_PROVIDER env var)
provider = "github"
# Model identifier
model = "DeepSeek-V3.2"
# model = "gpt-4.1"
# OpenAI-compatible endpoint (set via OPENAI_BASE_URL env var)
base_url = ""
# LLM concurrency for L3 scoring
concurrency = 3

[site]
# Website URL used for QR code in share images
site_url = "https://github-ai-detector.vercel.app/"

[analysis]
# Max items to fetch per event type (latest N commits, most recently updated N issues/PRs)
max_items = 100
# Max pagination pages (commits are filtered for merge commits, may need multiple pages)
max_pages = 10
# High-risk threshold (events with AI score >= this value are flagged)
high_risk_threshold = 0.6
# Skip repos with no push activity in the last N days (0 = disabled)
inactive_days = 14

[analysis.weights]
# Dimension weights for AII formula
# Issues are informational only and excluded from AII (title+body alone is too unreliable)
commit = 0.5
pr = 0.3
review = 0.2
issue = 0.0

[bots]
# System bot logins (lowercase) — filtered by L1, ai_score = 0
system = [
    # Dependency management
    "dependabot[bot]",
    "dependabot-preview[bot]",
    "renovate[bot]",
    "greenkeeper[bot]",
    "depfu[bot]",
    "pyup-bot",
    "snyk-bot",
    "whitesource-bolt-for-github[bot]",
    "mend-bolt-for-github[bot]",
    # CI/CD & deployment
    "github-actions[bot]",
    "netlify[bot]",
    "vercel[bot]",
    "railway-app[bot]",
    "render[bot]",
    "circleci-bot",
    # Code quality & coverage
    "codecov[bot]",
    "codecov-commenter[bot]",
    "sonarcloud[bot]",
    "codeclimate[bot]",
    "coveralls[bot]",
    "lgtm-com[bot]",
    # Repository maintenance
    "stale[bot]",
    "allcontributors[bot]",
    "imgbot[bot]",
    "mergify[bot]",
    "pre-commit-ci[bot]",
    "github-pages[bot]",
    # Release & changelog
    "semantic-release-bot",
    "release-drafter[bot]",
    "changeset-bot[bot]",
]
# AI bot logins (lowercase) — identified by L2, ai_score = 1.0
ai = [
    # GitHub Copilot
    "github-copilot[bot]",
    "copilot[bot]",
    "copilot-swe-agent[bot]",
    # Code review AI
    "coderabbitai[bot]",
    "coderabbitai",
    "codiumai-pr-agent-pro[bot]",
    "pr-agent[bot]",
    "sourcery-ai[bot]",
    "ellipsis-dev[bot]",
    # AI coding agents
    "sweep-ai[bot]",
    "deepsource-autofix[bot]",
    "claude-by-anthropic[bot]",
    "devin-ai[bot]",
    "cursor[bot]",
    "aider-bot[bot]",
    # AI fix/refactor
    "greptileai[bot]",
    "korbit-ai[bot]",
    "bito-ai[bot]",
    "tabnine[bot]",
    # AI review / Codex
    "chatgpt-codex-connector[bot]",
    "copilot-pull-request-reviewer[bot]",
    "openai-codex[bot]",
]

[database]
# SQLite database file path
path = "ai_radar.db"

[icons]
# Custom icons for repositories (optional).
# Key = "owner/repo", value = icon image URL.
# If not set, the GitHub org/user avatar is used automatically.
# Example:
# "HKUDS/nanobot" = "https://example.com/custom-icon.png"
