{#- Base page layout — all pages extend this -#}
{% from "macros.html" import score_class, pct, badge_cls %}
<!DOCTYPE html>
<html lang="en" data-theme="corporate">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}GitHub AI Radar{% endblock %}</title>
<meta name="description" content="{% block description %}Track AI-generated code across open-source GitHub repositories. Daily automated reports with AI Involvement Index scores.{% endblock %}">
<meta name="robots" content="index, follow">
<meta name="theme-color" content="#f0ebe4">
{% block og %}
<meta property="og:type" content="website">
<meta property="og:title" content="GitHub AI Radar">
<meta property="og:description" content="Track AI-generated code across open-source GitHub repositories.">
<meta property="og:site_name" content="GitHub AI Radar">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="GitHub AI Radar">
<meta name="twitter:description" content="Track AI-generated code across open-source GitHub repositories.">
{% endblock %}
<link rel="icon" type="image/svg+xml" href="{{ favicon_path }}">
<link rel="alternate" type="application/rss+xml" title="GitHub AI Radar" href="/feed.xml">
{% block head_extra %}{% endblock %}
<link rel="stylesheet" href="{{ css_path }}">
<style>html{scroll-behavior:auto!important}</style>
</head>
<body class="bg-beige-100 font-sans text-base-content min-h-screen">
{% block body %}{% endblock %}
{% block scripts %}{% endblock %}
</body>
</html>
